<div class="d-flex justify-content-center align-items-center min-vh-100 login-bg">
  <div class="container">
    <div class="row shadow-lg rounded overflow-hidden bg-white login-card">

      <div class="col-md-6 d-none d-md-flex flex-column justify-content-center align-items-center brand-section p-5">
        <h2 class="text-white text-center mb-3 fw-bold fs-2">Bienvenido</h2>
        <div class="img mb-3">
          <img src="assets/images/logo_Oaxaca.jpeg" alt="Logo de Finova" class="img-fluid" style="max-width: 200px;">
        </div>
        <p class="text-white text-center mb-4 fs-4">Secretaria de Finanzas</p>

      </div>

      <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
        <h3 class="text-center mb-4 form-title">Iniciar Sesión</h3>

        <form [formGroup]="loginForm" (ngSubmit)="ingresar()">
          <div class="mb-3">
            <label for="usuario" class="form-label fw-bold">Usuario</label>
            <input type="text" id="usuario" formControlName="usuario" class="form-control custom-input"
              placeholder="Ingresa tu usuario">
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-bold">Contraseña</label>
            <input type="password" id="password" formControlName="password" class="form-control custom-input"
              placeholder="••••••••">
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input custom-checkbox" id="rememberMe">
              <label class="form-check-label text-muted" for="rememberMe">Mantener sesión</label>
            </div>
            <a href="#" class="text-decoration-none custom-link">¿Olvidaste tu contraseña?</a>
          </div>

          <button type="submit" class="btn w-100 custom-btn">Ingresar</button>
        </form>
      </div>

    </div>
  </div>
</div>
