<div class="d-flex min-vh-100 bg-light">

  <nav class="sidebar-container d-flex flex-column py-3 shadow-sm" [class.expanded]="menuAbierto">

    <div class="px-3 mb-4 d-flex align-items-center" style="height: 40px">
      <button class="btn border-0 d-flex align-items-center rounded-circle p-2 me-2 btn-hamburguesa"
        (click)="toggleMenu()">
        <i class="bi bi-list fs-5"></i>
      </button>
    </div>

    <ul class="nav flex-column mb-auto">

      <li class="nav-item mb-3 border-bottom pb-2">
        <a routerLink="dashboard" routerLinkActive="active" class="nav-link d-flex align-items-center text-dark px-3">
          <i class="bi bi-grid-1x2-fill fs-5 icon-fixed-width text-center"></i>
          <span class="ms-3 menu-text">Centro de Mando</span>
        </a>
      </li>

      <li class="nav-item mb-1">
        <a routerLink="nivel1" routerLinkActive="active" class="nav-link d-flex align-items-center text-dark px-3">
          <i class="bi bi-clipboard-fill fs-5 icon-fixed-width text-center"></i>
          <span class="ms-3 menu-text">Registro</span>
        </a>
      </li>

      <li class="nav-item mb-1">
        <a routerLink="nivel2" routerLinkActive="active" class="nav-link d-flex align-items-center text-dark">
          <i class="bi bi-folder-fill fs-5 ms-2"></i>
          <span class="ms-3 menu-text">Gestión Expediente</span>
        </a>
      </li>

      <li class="nav-item mb-1">
        <a routerLink="nivel3" routerLinkActive="active" class="nav-link d-flex align-items-center text-dark">
          <i class="bi bi-map-fill fs-5 ms-2"></i>
          <span class="ms-3 menu-text">Asignación y Rutas</span>
        </a>
      </li>

      <li class="nav-item mb-1">
        <a routerLink="nivel4" routerLinkActive="active" class="nav-link d-flex align-items-center text-dark">
          <i class="bi bi-graph-up fs-5 ms-2"></i>
          <span class="ms-3 menu-text">Reportes</span>
        </a>
      </li>

    </ul>
  </nav>

  <!-- Esta es la NavBar -->
  <div class="d-flex flex-column flex-grow-1 w-100">

    <header
      class="navbar navbar-expand-lg bg-white border-bottom px-4 py-2 shadow-sm d-flex justify-content-between align-items-center">

      <span class="fw-bold fs-3" style="color: #9D2449;">Secretaria de Finanzas</span>

      <div class="d-flex align-items-center">

        <button class="btn rounded-circle me-3 p-2 position-relative btn-noti" style="width: 40px; height: 40px;">
          <i class="bi bi-bell text-dark"></i>
          <span class="position-absolute top-0 start-100 translate-middle p-1 rounded-circle"
            style="background-color: #9D2449;">
            <span class="visually-hidden">Nuevas alertas</span>
          </span>
        </button>

        <div class="dropdown">
          <a href="#" class="d-flex align-items-center text-decoration-none text-dark dropdown-toggle" id="userDropdown"
            data-bs-toggle="dropdown" aria-expanded="false">
            <div class="rounded-circle d-flex justify-content-center align-items-center me-2 text-white fw-bold"
              style="width: 35px; height: 35px; background-color: #B38E5D;">
              A
            </div>
            <strong>Admin</strong>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i> Mi Perfil</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i> Configuración</a></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-box-arrow-right me-2"></i> Cerrar
                sesión</a></li>
          </ul>
        </div>

      </div>
    </header>

    <nav aria-label="breadcrumb" class="d-flex align-items-center">
      <ol class="breadcrumb mb-0 ms-5 mt-3">
        <li class="breadcrumb-item" *ngFor="let miga of migasDePan; let isLast = last" [class.active]="isLast">

          <a *ngIf="!isLast" [routerLink]="miga.ruta" class="text-decoration-none fw-semibold" style="color: #B38E5D;">
            <i class="bi bi-house-door-fill me-1" *ngIf="miga.etiqueta === 'Panel'"></i>
            {{ miga.etiqueta }}
          </a>

          <span *ngIf="isLast" class="fw-bold" style="color: #285C4D;" aria-current="page">
            {{ miga.etiqueta }}
          </span>

        </li>
      </ol>
    </nav>


    <main class="flex-grow-1 p-4 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
